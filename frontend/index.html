<!DOCTYPE html>
<html lang="fr">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon App - MySQL + Node.js + Python</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

        <h1>📊 Tableau de bord des APIs</h1>

                <p id="python-status">Chargement...</p>

        </div>
        <div class="footer">
            <p>✨ Données provenant de MySQL (persistant) ✨</p>
        </div>
    </div>
    <script src="script.js"></script>
